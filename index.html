<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Multi-Timezone Clock</title>
</head>
<body>
    <h1>Multi-Timezone Digital Clock</h1>
    <div id="clocks">
        <div class="clock" id="utc">UTC: <span class="time"></span></div>
        <div class="clock" id="est">EST: <span class="time"></span></div>
        <div class="clock" id="cst">CST: <span class="time"></span></div>
        <div class="clock" id="pst">PST: <span class="time"></span></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
